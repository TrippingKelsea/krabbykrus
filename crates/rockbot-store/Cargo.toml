[package]
name = "rockbot-store"
version.workspace = true
edition = "2021"
description = "Unified embedded storage layer for RockBot (redb + optional OpenRaft replication)"
license = "MIT"

[features]
default = []
replication = ["dep:openraft", "dep:futures-util"]

[dependencies]
redb = "2"
rockbot-config = { path = "../rockbot-config" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
chacha20 = "0.9"
openraft = { version = "0.10.0-alpha.17", features = ["type-alias"], optional = true }
futures-util = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
