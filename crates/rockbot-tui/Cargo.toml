[package]
name = "rockbot-tui"
version.workspace = true
edition = "2021"
description = "Terminal user interface for RockBot"
license = "MIT"

[features]
default = ["bedrock", "discord", "telegram", "signal", "tools-credentials", "tools-mcp", "tools-markdown"]
# LLM providers
anthropic = ["dep:rockbot-llm-anthropic"]
openai = []
ollama = ["rockbot-llm/ollama"]
bedrock = []
# Channel providers
discord = []
telegram = []
signal = []
# Tool providers
tools-credentials = []
tools-mcp = []
tools-markdown = []
# Embedded overseer
overseer = []
# Embedded doctor AI for config diagnostics
doctor-ai = ["dep:rockbot-doctor"]
# Embedded butler companion agent
butler = ["dep:rockbot-butler"]
# Noise handshake and transport primitives
noise = ["rockbot-client/noise"]
# Remote tool execution
remote-exec = ["noise", "rockbot-client/remote-exec"]
# Allow plain-text HTTP/WS connections
http-insecure = ["rockbot-client/http-insecure"]

[lints]
workspace = true

[dependencies]
rockbot-agent = { path = "../rockbot-agent" }
rockbot-client = { path = "../rockbot-client" }
rockbot-config = { path = "../rockbot-config" }
rockbot-gateway = { path = "../rockbot-gateway", default-features = false }
rockbot-tools = { path = "../rockbot-tools" }
rockbot-memory = { path = "../rockbot-memory" }
rockbot-security = { path = "../rockbot-security" }
rockbot-credentials = { path = "../rockbot-credentials" }
rockbot-credentials-schema = { path = "../rockbot-credentials-schema" }
rockbot-llm = { path = "../rockbot-llm", default-features = false }
rockbot-llm-anthropic = { path = "../rockbot-llm-anthropic", optional = true }
rockbot-pki = { path = "../rockbot-pki" }
rockbot-doctor = { path = "../rockbot-doctor", optional = true }
rockbot-butler = { path = "../rockbot-butler", optional = true }
rockbot-store = { path = "../rockbot-store" }
rockbot-chat = { path = "../rockbot-chat" }
rockbot-editor = { path = "../rockbot-editor" }
rockbot-shell = { path = "../rockbot-shell" }

uuid = { workspace = true }
chrono = { workspace = true }

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
toml_edit = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
dirs = { workspace = true }
reqwest = { workspace = true }

# TUI
ratatui = { version = "0.29", features = ["unstable-rendered-line-info"] }
crossterm = { version = "0.28", features = ["event-stream", "bracketed-paste"] }
tachyonfx = { version = "0.10", features = ["std-duration"] }
futures = "0.3"
nucleo-matcher = "0.3"

# WebSocket
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
